<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="614" cy="-47" r="66" fill="#16213e" opacity="0.12"/>
    <circle cx="120" cy="174" r="36" fill="#16213e" opacity="0.20"/>
    <circle cx="786" cy="361" r="71" fill="#16213e" opacity="0.14"/>
    <circle cx="356" cy="401" r="73" fill="#16213e" opacity="0.16"/>
    <circle cx="-39" cy="98" r="64" fill="#16213e" opacity="0.10"/>
    <circle cx="1294" cy="655" r="38" fill="#16213e" opacity="0.13"/>
    <rect x="688" y="632" width="72" height="63" rx="8" fill="#1a1a2e" opacity="0.06" transform="rotate(25, 167, 371)"/>
    <rect x="1134" y="511" width="84" height="36" rx="8" fill="#1a1a2e" opacity="0.14" transform="rotate(32, 821, 258)"/>
    <rect x="472" y="531" width="96" height="99" rx="8" fill="#1a1a2e" opacity="0.15" transform="rotate(28, -9, 703)"/>
    <rect x="677" y="574" width="99" height="52" rx="8" fill="#1a1a2e" opacity="0.05" transform="rotate(3, 645, 624)"/>
    <rect x="595" y="636" width="20" height="52" rx="8" fill="#1a1a2e" opacity="0.05" transform="rotate(42, 987, 484)"/>
    <rect x="560" y="552" width="83" height="65" rx="8" fill="#1a1a2e" opacity="0.11" transform="rotate(10, 1148, 494)"/>
    <rect x="-61" y="154" width="58" height="73" rx="8" fill="#1a1a2e" opacity="0.07" transform="rotate(20, 807, -89)"/>
    <rect x="262" y="419" width="39" height="74" rx="8" fill="#1a1a2e" opacity="0.08" transform="rotate(16, -69, -84)"/>
    <polygon points="603,-164 673,-24 533,-24" fill="#16213e" opacity="0.11"/>
    <polygon points="1272,97 1326,205 1218,205" fill="#16213e" opacity="0.07"/>
    <polygon points="804,143 895,325 713,325" fill="#16213e" opacity="0.10"/>
    <polygon points="1238,95 1263,145 1213,145" fill="#16213e" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,570 C360,600 840,540 1200,570 L1200,630 L0,630Z" fill="#16213e" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 대행 사이트
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 프록시 보안
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#e94560" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#e94560" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 대행 사이트 — 프록시 보안
  </text>
</svg>